services:
  # Redis Cluster Nodes
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    command: >
      redis-server
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7001:7001"
    networks:
      app_network:
        ipv4_address: 172.18.0.10
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7001", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    command: >
      redis-server
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7002:7002"
    networks:
      app_network:
        ipv4_address: 172.18.0.11
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7002", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    command: >
      redis-server
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7003:7003"
    networks:
      app_network:
        ipv4_address: 172.18.0.12
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7003", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-node-4:
    image: redis:7-alpine
    container_name: redis-node-4
    command: >
      redis-server
      --port 7004
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7004:7004"
    networks:
      app_network:
        ipv4_address: 172.18.0.13
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7004", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-node-5:
    image: redis:7-alpine
    container_name: redis-node-5
    command: >
      redis-server
      --port 7005
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7005:7005"
    networks:
      app_network:
        ipv4_address: 172.18.0.14
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7005", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-node-6:
    image: redis:7-alpine
    container_name: redis-node-6
    command: >
      redis-server
      --port 7006
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
    ports:
      - "7006:7006"
    networks:
      app_network:
        ipv4_address: 172.18.0.15
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7006", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cluster Initialiser
  # Runs once, wires all 6 nodes into a cluster, then exits
  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      redis-node-1:
        condition: service_healthy
      redis-node-2:
        condition: service_healthy
      redis-node-3:
        condition: service_healthy
      redis-node-4:
        condition: service_healthy
      redis-node-5:
        condition: service_healthy
      redis-node-6:
        condition: service_healthy
    command: >
      redis-cli --cluster create
      172.18.0.10:7001
      172.18.0.11:7002
      172.18.0.12:7003
      172.18.0.13:7004
      172.18.0.14:7005
      172.18.0.15:7006
      --cluster-replicas 1
      --cluster-yes
    networks:
      - app_network

  # App Instances
  app_1:
    build: .
    container_name: app_1
    environment:
      - PORT=3000
      - REDIS_CLUSTER=true
      - REDIS_NODE_1=172.18.0.10:7001
      - REDIS_NODE_2=172.18.0.11:7002
      - REDIS_NODE_3=172.18.0.12:7003
      - INSTANCE_ID=app_1
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
    networks:
      - app_network

  app_2:
    build: .
    container_name: app_2
    environment:
      - PORT=3000
      - REDIS_CLUSTER=true
      - REDIS_NODE_1=172.18.0.10:7001
      - REDIS_NODE_2=172.18.0.11:7002
      - REDIS_NODE_3=172.18.0.12:7003
      - INSTANCE_ID=app_2
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
    networks:
      - app_network

  app_3:
    build: .
    container_name: app_3
    environment:
      - PORT=3000
      - REDIS_CLUSTER=true
      - REDIS_NODE_1=172.18.0.10:7001
      - REDIS_NODE_2=172.18.0.11:7002
      - REDIS_NODE_3=172.18.0.12:7003
      - INSTANCE_ID=app_3
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
    networks:
      - app_network

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app_1
      - app_2
      - app_3
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16