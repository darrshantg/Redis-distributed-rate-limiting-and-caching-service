events {
  worker_connections 1024;
}

http {
  # Define the pool of app instances
  upstream app_cluster {
    # Round-robin by default — each request goes to next server
    server app_1:3000;
    server app_2:3000;
    server app_3:3000;

    # Keepalive connections to app servers
    keepalive 32;
  }

  server {
    listen 80;

    # Pass real client IP to app (for rate limiting by IP)
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;

    # Forward all headers from app back to client
    proxy_pass_header X-RateLimit-Limit;
    proxy_pass_header X-RateLimit-Remaining;
    proxy_pass_header X-RateLimit-Algorithm;
    proxy_pass_header X-RateLimit-Reset;
    proxy_pass_header X-Cache;
    proxy_pass_header Retry-After;

    # Add header showing which app instance handled the request
    add_header X-Handled-By $upstream_addr always;

    location / {
      proxy_pass http://app_cluster;
    }
  }
}